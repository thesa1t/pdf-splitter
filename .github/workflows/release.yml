name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tesseract + dylibbundler
        run: |
          brew install tesseract tesseract-lang dylibbundler

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Generate icons
        run: python build_app.py

      - name: Vendor Tesseract (binary + dylibs + tessdata)
        run: |
          set -e
          TESS_BIN="$(command -v tesseract)"
          TESS_REAL="$(python3 -c 'import os,sys; print(os.path.realpath(sys.argv[1]))' "$TESS_BIN")"
          TESS_DATA=""
          for D in \
              "$(brew --prefix)/share/tessdata" \
              "$(brew --prefix tesseract)/share/tessdata" \
              "/opt/homebrew/share/tessdata" \
              "/usr/local/share/tessdata"; do
              if [ -f "$D/rus.traineddata" ]; then
                  TESS_DATA="$D"
                  break
              fi
          done
          if [ -z "$TESS_DATA" ]; then
              echo "rus.traineddata not found"; exit 1
          fi
          rm -rf vendored
          mkdir -p vendored/tessdata vendored/libs
          cp "$TESS_REAL" vendored/tesseract
          chmod +w vendored/tesseract
          cp "$TESS_DATA/rus.traineddata" vendored/tessdata/
          cp "$TESS_DATA/eng.traineddata" vendored/tessdata/ 2>/dev/null || true
          cp "$TESS_DATA/osd.traineddata" vendored/tessdata/ 2>/dev/null || true
          dylibbundler -od -b -x vendored/tesseract -d vendored/libs/ -p '@executable_path/libs/'

      - name: Build .app
        run: |
          pyinstaller --noconfirm --windowed --clean \
            --name "PDF Splitter" \
            --icon icon.icns \
            --osx-bundle-identifier com.salt.pdfsplitter \
            --hidden-import config \
            --hidden-import pdf_processor \
            --add-binary "vendored/tesseract:." \
            --add-binary "vendored/libs:libs" \
            --add-data "vendored/tessdata:tessdata" \
            main.py

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "PDF Splitter" \
            --window-size 540 360 \
            --icon-size 96 \
            --icon "PDF Splitter.app" 140 160 \
            --app-drop-link 400 160 \
            "PDF-Splitter-macOS.dmg" \
            "dist/PDF Splitter.app" || \
          (cd dist && zip -ry ../PDF-Splitter-macOS.zip "PDF Splitter.app")

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            PDF-Splitter-macOS.dmg
            PDF-Splitter-macOS.zip

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PDF-Splitter-macOS.dmg
            PDF-Splitter-macOS.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tesseract + Russian traineddata
        shell: pwsh
        run: |
          choco install tesseract --no-progress -y
          $tessDir = "C:\Program Files\Tesseract-OCR"
          if (-not (Test-Path "$tessDir\tesseract.exe")) {
            Write-Error "Tesseract install failed: $tessDir\tesseract.exe missing"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path "$tessDir\tessdata" | Out-Null
          foreach ($lang in @('rus', 'eng', 'osd')) {
            $dst = "$tessDir\tessdata\$lang.traineddata"
            if (-not (Test-Path $dst)) {
              Invoke-WebRequest -Uri "https://github.com/tesseract-ocr/tessdata/raw/main/$lang.traineddata" -OutFile $dst
            }
          }
          echo "TESSERACT_HOME=$tessDir" >> $env:GITHUB_ENV

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Generate icons
        run: python build_app.py

      - name: Vendor Tesseract (binary + DLLs + tessdata)
        shell: pwsh
        run: |
          $tessDir = $env:TESSERACT_HOME
          if (Test-Path vendored) { Remove-Item vendored -Recurse -Force }
          New-Item -ItemType Directory -Force -Path "vendored\Tesseract-OCR\tessdata" | Out-Null
          Copy-Item "$tessDir\*.exe" "vendored\Tesseract-OCR\" -Force
          Copy-Item "$tessDir\*.dll" "vendored\Tesseract-OCR\" -Force
          Copy-Item "$tessDir\tessdata\rus.traineddata" "vendored\Tesseract-OCR\tessdata\" -Force
          if (Test-Path "$tessDir\tessdata\eng.traineddata") { Copy-Item "$tessDir\tessdata\eng.traineddata" "vendored\Tesseract-OCR\tessdata\" -Force }
          if (Test-Path "$tessDir\tessdata\osd.traineddata") { Copy-Item "$tessDir\tessdata\osd.traineddata" "vendored\Tesseract-OCR\tessdata\" -Force }
          if (Test-Path "$tessDir\tessdata\configs") { Copy-Item "$tessDir\tessdata\configs" "vendored\Tesseract-OCR\tessdata\configs" -Recurse -Force }
          if (Test-Path "$tessDir\tessdata\tessconfigs") { Copy-Item "$tessDir\tessdata\tessconfigs" "vendored\Tesseract-OCR\tessdata\tessconfigs" -Recurse -Force }

      - name: Build .exe
        run: >
          pyinstaller --noconfirm --windowed --clean
          --name "PDF Splitter"
          --icon icon.ico
          --hidden-import config
          --hidden-import pdf_processor
          --add-data "vendored/Tesseract-OCR;Tesseract-OCR"
          main.py

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path "dist/PDF Splitter/*" -DestinationPath "PDF-Splitter-Windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: PDF-Splitter-Windows.zip

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PDF-Splitter-Windows.zip
